name: Test

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]
  
jobs:
  this_job_run_the_tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        os : [ubuntu-latest, windows-latest]
    runs on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v3
      - uses: astral-sh/setup-uv@v5
        name: install UV
      - run: uvx --python ${{ matrix.python-version }} pytest test_code.py